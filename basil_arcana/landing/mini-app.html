        const url = new URL(path, window.location.href);
        if (lang && lang !== "ru") url.searchParams.set("lang", lang);
        return `${url.pathname}${url.search}`;
      }

      function applyLang(lang) {
        const resolved = copy[lang] ? lang : "ru";
        const pack = copy[resolved];
        document.documentElement.lang = resolved === "kz" ? "kk" : resolved;

        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = pack[node.dataset.i18n] || "";
        });
        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.setAttribute("aria-pressed", String(btn.dataset.lang === resolved));
        });

        const home = document.querySelector(".breadcrumb-home");
        if (home) {
          const labels = { ru: "Главная", kz: "Басты бет", en: "Home" };
          home.textContent = labels[resolved] || labels.ru;
          home.setAttribute("href", withLang("./index.html", resolved));
        }

        document.querySelector(".logo").setAttribute("href", withLang("./index.html", resolved));

        /* nav-i18n */const navLabelPack={ru:{news:'Новости',academy:'Академия Таро',tarot:'Карты таро «RWS»',lenormand:'Колода Таро Ленорман',crowley:'Колода Таро Тота Алистера Кроули'},kz:{news:'Жаңалықтар',academy:'Таро Академиясы',tarot:'RWS Таро карталары',lenormand:'Ленорман Таро колодасы',crowley:'Алистер Кроули Тот Таро колодасы'},en:{news:'News',academy:'Tarot Academy',tarot:'RWS Tarot Cards',lenormand:'Lenormand Tarot Deck',crowley:'Aleister Crowley Thoth Tarot Deck'}};const langCode=(typeof resolved!=='undefined'&&resolved)||(typeof lang!=='undefined'&&lang)||'ru';const navPack=navLabelPack[langCode]||navLabelPack.ru;document.querySelectorAll('[data-nav]').forEach((node)=>{const key=node.dataset.nav;if(navPack[key])node.textContent=navPack[key];const p=node.dataset.path||node.getAttribute('href')||'';if(!p)return;const u=new URL(p,window.location.href);if(langCode==='ru')u.searchParams.delete('lang');else u.searchParams.set('lang',langCode);node.setAttribute('href',u.pathname+u.search);});

        const url = new URL(window.location.href);
        if (resolved === "ru") url.searchParams.delete("lang");
        else url.searchParams.set("lang", resolved);
        window.history.replaceState({}, "", url.toString());
        window.localStorage.setItem(LANG_STORAGE_KEY, resolved);
      }

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.addEventListener("click", () => applyLang(btn.dataset.lang));
      });

      const initialLang = new URLSearchParams(window.location.search).get("lang");
      const storedLang = window.localStorage.getItem(LANG_STORAGE_KEY);
      applyLang(initialLang || storedLang || "ru");
    </script>
  </body>
</html>
