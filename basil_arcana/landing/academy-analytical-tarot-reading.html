      const copy = {
        ru: {
          topLine:"Магический плюс вайб", sectionLabel:"Академия Таро", title:"Как правильное чтение раскладов Таро может улучшить жизнь", lead:"Таро становится полезным инструментом не тогда, когда человек слепо верит каждой фразе, а когда он умеет аналитически интерпретировать символы, проверять выводы фактами и превращать чтение в практические шаги. Именно такой подход помогает повышать качество решений в отношениях, работе, деньгах и личных границах.", h1:"Почему расклады реально могут помогать", p1:"Хороший расклад структурирует внимание. Вместо хаотичного внутреннего диалога человек получает рамку: что происходит сейчас, где источник напряжения, какие ресурсы доступны и какой шаг даст самый полезный эффект. Уже сама эта структура снижает тревожность и возвращает ощущение управляемости жизни.", l1:"Карты помогают назвать эмоции и внутренние конфликты, которые трудно заметить в суете.", l2:"Расклад переводит абстрактный страх в конкретные гипотезы и варианты действий.", l3:"Появляется дистанция от импульсивных реакций, а значит растет зрелость решений.", h2:"Главная ошибка: мистифицировать любой ответ", p2:"Если воспринимать любой расклад как приговор, практика становится опасной: человек передает ответственность внешнему источнику и начинает действовать из страха. Такой формат делает Таро не инструментом самопознания, а механизмом зависимости. Зрелая работа с картами строится наоборот: «Это одна из интерпретаций, а не абсолютная истина».", p3:"Критическое мышление в Таро не отменяет интуицию, а защищает ее. Вы можете чувствовать символ глубоко, но все равно обязаны задавать вопросы: на чем основан вывод, какие есть альтернативы, как проверить гипотезу в реальности.", h3:"Аналитический протокол чтения: 3 шага", l4:"Сначала контекст: четко формулируйте вопрос, срок и зону личной ответственности.", l5:"Потом интерпретация: рассматривайте минимум две версии значения каждой ключевой карты.", l6:"В финале проверка: назначайте один конкретный шаг на 24-72 часа и оценивайте результат по фактам.", h4:"Как этот подход улучшает повседневную жизнь", p4:"Когда вы регулярно читаете расклады аналитически, меняется не только отношение к картам, но и стиль жизни в целом. Вы учитесь не драматизировать, а уточнять. Не убегать в фантазии, а искать проверяемые сигналы. Не застревать в эмоциях, а переходить к действиям.", l7:"В отношениях: меньше проекций, больше честных разговоров о реальных потребностях.", l8:"В работе: меньше хаотичных решений, больше стратегических шагов с понятными рисками.", l9:"В личной психогигиене: меньше тревожного шума, больше внутренней опоры и ясности.", h5:"Вывод", p5:"Правильное чтение Таро — это сочетание символического языка и рационального анализа. Карты могут стать сильным зеркалом, но именно вы выбираете, как смотреть в это зеркало: пассивно, через страх, или активно — через ответственность и наблюдение.", p6:"Если вы хотите, чтобы практика реально улучшала жизнь, держитесь простого принципа: воспринимайте расклад как интеллектуальный и эмоциональный материал для размышления, а не как магическую команду. Тогда Таро работает в вашу пользу: расширяет взгляд, проясняет решения и укрепляет личную взрослую позицию.", navNews:"Новости", navTarot:"Карты Таро", navLenormand:"Колода Ленорман", navAcademy:"Академия Таро", footer:"BasilArcana · RU / KZ / EN · Telegram-first experience", devCta:"Разработка ботов и приложений на заказ под ключ — напишите нам" },
        kz: {

сигнал іздейсіз. Эмоцияда тұрып қалмай, әрекетке өтесіз.", l7:"Қарым-қатынаста: проекция азайып, нақты қажеттілік туралы ашық диалог көбейеді.", l8:"Жұмыста: хаос азайып, тәуекелі түсінікті стратегиялық қадам көбейеді.", l9:"Психогигиенада: мазасыз шу азайып, ішкі тірек пен айқындық күшейеді.", h5:"Қорытынды", p5:"Тароны дұрыс оқу — символдық тіл мен рационал талдаудың үйлесімі. Карталар күшті айна болуы мүмкін, бірақ сол айнаға қалай қарайтыныңызды өзіңіз таңдайсыз: қорқынышпен бе, әлде жауапкершілікпен бе.", p6:"Егер практикаңыз өмірді жақсартсын десеңіз, қарапайым қағиданы ұстаныңыз: таралымды магиялық бұйрық емес, ойлануға арналған эмоциялық және интеллектуал материал ретінде қабылдаңыз. Сонда Таро пайдаңызға жұмыс істейді: көкжиегіңізді кеңейтеді, шешімді айқындайды және ересек ішкі позицияны күшейтеді.", navNews:"Жаңалықтар", navTarot:"Таро карталары", navLenormand:"Ленорман колодасы", navAcademy:"Таро академиясы", footer:"BasilArcana · RU / KZ / EN · Telegram-first experience", devCta:"Тапсырыс бойынша bot және app толық әзірлеу — бізге жазыңыз" },
        en: {
          topLine:"Magic plus vibe", sectionLabel:"Tarot Academy", title:"How proper Tarot interpretation can improve your life", lead:"Tarot becomes truly useful not when you believe every line blindly, but when you interpret symbols analytically, test conclusions against reality, and convert insights into action. This approach improves decision quality across relationships, work, money, and personal boundaries.", h1:"Why readings can genuinely help", p1:"A strong spread structures attention. Instead of a chaotic inner loop, you get a working frame: what is happening now, where tension comes from, what resources are available, and which next step creates the highest leverage. That structure alone reduces anxiety and restores a sense of agency.", l1:"Cards help name emotions and inner conflicts that are easy to miss in daily noise.", l2:"A spread turns abstract fear into concrete hypotheses and options.", l3:"You gain distance from impulsive reactions, so decision maturity grows.", h2:"The main mistake: treating every answer as absolute truth", p2:"If every reading is treated as fate, practice becomes risky: responsibility is outsourced, and actions are driven by fear. In that mode, Tarot stops being a reflection tool and turns into dependency. Mature practice says the opposite: this is one interpretation, not a final verdict.", p3:"Critical thinking does not kill intuition, it protects it. You can feel a symbol deeply and still ask disciplined questions: what supports this conclusion, what alternatives exist, and how can I validate this hypothesis in real life.", h3:"Analytical reading protocol: 3 steps", l4:"Start with context: define question, timeline, and personal influence zone.", l5:"Then interpret: explore at least two meaning versions for each key card.", l6:"Finally validate: choose one concrete action for the next 24-72 hours and evaluate by facts.", h4:"How this improves everyday life", p4:"When you read this way consistently, you improve more than tarot skill. You change your operating style: less dramatization, more clarification; less fantasy escape, more signal checking; less emotional looping, more grounded action.", l7:"In relationships: fewer projections, more honest conversations about needs.", l8:"At work: fewer chaotic moves, more strategic steps with visible risk control.", l9:"In mental hygiene: less anxiety noise, more internal stability and clarity.", h5:"Conclusion", p5:"Proper Tarot practice is the combination of symbolic language and rational analysis. Cards can be a powerful mirror, but you choose how to use that mirror: passively through fear, or actively through responsibility and observation.", p6:"If you want Tarot to improve life outcomes, keep one principle: treat each spread as emotional and intellectual input for reflection, not as a magical command. That is how Tarot expands perspective, sharpens decisions, and strengthens an adult self-position.", navNews:"News", navTarot:"Tarot cards", navLenormand:"Lenormand deck", navAcademy:"Tarot Academy", footer:"BasilArcana · RU / KZ / EN · Telegram-first experience", devCta:"Turnkey custom bot and app development — write to us" }
      };
      function withLang(path, lang){ const url = new URL(path, window.location.href); if(lang && lang !== "ru") url.searchParams.set("lang", lang); return `${url.pathname}${url.search}`; }
      function applyLang(lang){ const resolved = copy[lang] ? lang : "ru"; const pack = copy[resolved]; document.documentElement.lang = resolved === "kz" ? "kk" : resolved; document.querySelectorAll("[data-i18n]").forEach((node)=>{ node.textContent = pack[node.dataset.i18n] || ""; }); document.querySelectorAll(".lang-btn").forEach((btn)=>btn.setAttribute("aria-pressed", String(btn.dataset.lang === resolved))); const links = { news:"./news.html", tarot:"./tarot-values.html", lenormand:"./lenormand-values.html", academy:"./academy.html" }; Object.entries(links).forEach(([key,path]) => { document.querySelectorAll(`[data-link="${key}"]`).forEach((node)=>node.setAttribute("href", withLang(path, resolved))); }); document.querySelector(".logo").setAttribute("href", withLang("./index.html", resolved)); const breadcrumbHome = document.querySelector(".breadcrumb-home"); if (breadcrumbHome) { const labels = { ru: "Главная", kz: "Басты бет", en: "Home" }; breadcrumbHome.textContent = labels[resolved] || labels.ru; breadcrumbHome.setAttribute("href", withLang("./index.html", resolved)); } const breadcrumbSection = document.querySelector(".breadcrumb-section"); if (breadcrumbSection) { breadcrumbSection.textContent = pack.sectionLabel; breadcrumbSection.setAttribute("href", withLang("./academy.html", resolved)); } const breadcrumbCurrent = document.querySelector(".breadcrumb-current"); if (breadcrumbCurrent) { const titleNode = document.querySelector("h1"); if (titleNode) breadcrumbCurrent.textContent = titleNode.textContent; } const url = new URL(window.location.href); if(resolved === "ru") url.searchParams.delete("lang"); else url.searchParams.set("lang", resolved); window.history.replaceState({}, "", url.toString()); window.localStorage.setItem(LANG_STORAGE_KEY, resolved); }
      document.querySelectorAll(".lang-btn").forEach((btn)=>btn.addEventListener("click",()=>applyLang(btn.dataset.lang)));
      const initialLang = new URLSearchParams(window.location.search).get("lang");
      const storedLang = window.localStorage.getItem(LANG_STORAGE_KEY);
      applyLang(initialLang || storedLang || "ru");
    </script>
  </body>
</html>
