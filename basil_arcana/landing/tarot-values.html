<script>
const LANG_STORAGE_KEY='basilarcana_lang';const deck='tarot';
const ui={ru:{topLine:'Магический плюс вайб',section:'Разделы',title:'Каталог классических карт Таро Rider-Waite-Smith',lead:'Классический каталог RWS: все арканы и масти с переходом на отдельные страницы карт, где собраны значения, аналитическая трактовка и практические выводы.',loading:'Загружаем карты...',error:'Не удалось загрузить карты.',navNews:'Новости',navTarot:'Карты таро «RWS»',navCrowley:'Колода Кроули',navLenormand:'Колода Таро Ленорман',navAcademy:'Академия Таро',footer:'BasilArcana · RU / KZ / EN · Telegram-first experience'},kz:{topLine:'Магия плюс vibe',section:'Бөлімдер',title:'Классикалық Rider-Waite-Smith Таро каталогы',lead:'Классикалық RWS каталогы: әр карта жеке бетке өтеді, онда мағына, аналитикалық интерпретация және практикалық қорытынды берілген.',loading:'Карталар жүктелуде...',error:'Карталарды жүктеу мүмкін болмады.',navNews:'Жаңалықтар',navTarot:'RWS Таро карталары',navCrowley:'Кроули колодасы',navLenormand:'Ленорман Таро колодасы',navAcademy:'Таро академиясы',footer:'BasilArcana · RU / KZ / EN · Telegram-first experience'},en:{topLine:'Magic plus vibe',section:'Sections',title:'Classic Rider-Waite-Smith Tarot Catalog',lead:'A complete RWS catalog with dedicated pages for each card: meanings, analytical interpretation, and practical takeaways.',loading:'Loading cards...',error:'Failed to load cards.',navNews:'News',navTarot:'RWS Tarot cards',navCrowley:'Crowley deck',navLenormand:'Lenormand Tarot deck',navAcademy:'Tarot Academy',footer:'BasilArcana · RU / KZ / EN · Telegram-first experience'}};
const cardAlias={major_10_wheel:'major_10_wheel_of_fortune'};const lenoSlugAlias={stars:'star',crossroads:'crossroad'};const embeddedLenormand={};
function withLang(path,lang){const u=new URL(path,window.location.href);if(lang&&lang!=='ru')u.searchParams.set('lang',lang);return `${u.pathname}${u.search}`;}
function imageUrl(key,card){if(key.startsWith('lenormand_')){if(card.imageUrl)return `https://basilarcana-assets.b-cdn.net/${card.imageUrl.replace(/^\/+/, '')}`;let tail=key.replace(/^lenormand_\d+_/,'');tail=lenoSlugAlias[tail]||tail;return `https://basilarcana-assets.b-cdn.net/cards/lenormand/ln_${tail}.webp`;}if(card.imageUrl)return `https://cdn.basilarcana.com/${card.imageUrl.replace(/^\/+/, '')}`;const suit=key.split('_')[0];const resolved=cardAlias[key]||key;return `https://cdn.basilarcana.com/cards/${suit}/${resolved}.webp`;}
async function loadCards(lang){if(deck==='lenormand'){const local=embeddedLenormand[lang]||embeddedLenormand.ru||{};const entries=Object.entries(local).filter(([k,v])=>k.startsWith('lenormand_')&&v&&typeof v==='object');if(entries.length)return entries;}const res=await fetch(`https://cdn.basilarcana.com/data/cards_${lang}.json`,{cache:'no-store'});if(!res.ok)throw new Error('cards');const payload=await res.json();return Object.entries(payload).filter(([,c])=>deck==='lenormand'?c.deck==='lenormand':deck==='crowley'?c.deck==='crowley':c.deck==='tarot');}
async function applyLang(lang){const resolved=ui[lang]?lang:'ru';const pack=ui[resolved];document.documentElement.lang=resolved==='kz'?'kk':resolved;document.querySelectorAll('[data-i18n]').forEach((n)=>{const k=n.dataset.i18n;if(pack[k])n.textContent=pack[k];});document.querySelectorAll('.lang-btn').forEach((b)=>b.setAttribute('aria-pressed',String(b.dataset.lang===resolved)));const home=document.querySelector('.breadcrumb-home');if(home){const h={ru:'Главная',kz:'Басты бет',en:'Home'};home.textContent=h[resolved]||h.ru;home.href=withLang('./index.html',resolved);}const cur=document.querySelector('.breadcrumb-current');if(cur)cur.textContent=pack.title;document.querySelectorAll('[data-link="tarot"]').forEach((n)=>n.href=withLang('./tarot-values.html',resolved));document.querySelectorAll('[data-link="crowley"]').forEach((n)=>n.href=withLang('./crowley-values.html',resolved));document.querySelectorAll('[data-link="lenormand"]').forEach((n)=>n.href=withLang('./lenormand-values.html',resolved));const status=document.getElementById('status');status.textContent=pack.loading;try{const cards=await loadCards(resolved);const gallery=document.getElementById('gallery');gallery.innerHTML='';cards.forEach(([key,card])=>{const a=document.createElement('a');a.className='card';a.href=withLang(`./card-${key.replaceAll('_','-')}.html`,resolved);a.innerHTML=`<img src="${imageUrl(key,card)}" alt="${card.title||key}" loading="lazy" /><h3>${card.title||key}</h3><p>${(card.meaning?.general||card.description||'').slice(0,120)}</p>`;gallery.appendChild(a);});status.textContent='';}catch(e){status.textContent=pack.error;}const url=new URL(window.location.href);if(resolved==='ru')url.searchParams.delete('lang');else url.searchParams.set('lang',resolved);window.history.replaceState({},'',url.toString());window.localStorage.setItem(LANG_STORAGE_KEY,resolved);}
document.querySelectorAll('.lang-btn').forEach((b)=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));const initialLang=new URLSearchParams(window.location.search).get('lang');const storedLang=window.localStorage.getItem(LANG_STORAGE_KEY);applyLang(initialLang||storedLang||'ru');
</script></body></html>
