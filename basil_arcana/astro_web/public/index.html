<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Astronautica: precision natal intelligence, daily guidance and compatibility insights."
    />
    <title>Astronautica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="dark">
    <header class="topbar">
      <a class="brand" href="/">Astronautica</a>
      <div class="topbar-right">
        <button id="menuButton" class="menu-btn" aria-label="Open navigation">Menu</button>
        <button id="profileButton" class="profile-chip" aria-label="Open profile" type="button">
          <img id="profileAvatar" class="profile-avatar" alt="Profile avatar" />
          <span id="profileInitials" class="profile-initials">?</span>
        </button>
      </div>
      <nav id="nav" class="nav">
        <a href="/">Home</a>
        <a href="/natal-chart">Natal Chart</a>
        <a href="/daily">Daily</a>
        <a href="/friends">Friends</a>
        <a href="/profile">Profile</a>
        <button id="themeToggle" class="theme-toggle" type="button">Theme: dark</button>
        <a href="/faq">FAQ</a>
      </nav>
    </header>

    <main id="app" class="page"></main>

    <footer class="footer">
      <p>2026 Astronautica</p>
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
